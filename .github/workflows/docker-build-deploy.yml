name: Docker Build & Deploy via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/sub2api

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: sha-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.run_id }}

  deploy:
    name: Deploy on VM via SSH
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          IMAGE_TAG: sha-${{ github.sha }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          APP_DIR: ${{ secrets.SSH_APP_DIR }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_REPO,IMAGE_TAG,GHCR_USERNAME,GHCR_PAT,APP_DIR
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR_CLEAN="$(printf '%s' "$APP_DIR" | sed 's/[[:space:]]*$//')"
            DEPLOY_DIR="${APP_DIR_CLEAN:-/home/ubuntu/apps/sub2api}/deploy"
            cd "$DEPLOY_DIR"
            trap 'rm -f docker-compose.deploy.override.yml' EXIT
            mkdir -p data postgres_data redis_data
            test -f .env
            test -f docker-compose.prod.yml
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            image_repo="${IMAGE_REPO:-ghcr.io/${GHCR_USERNAME}/sub2api}"
            image_tag="${IMAGE_TAG:-sha-${{ github.sha }}}"
            image_ref="${image_repo}:${image_tag}"
            test "$image_ref" != ":"
            printf 'services:\n  sub2api:\n    image: "%s"\n' "$image_ref" > docker-compose.deploy.override.yml
            docker compose -f docker-compose.prod.yml -f docker-compose.deploy.override.yml config --quiet

            docker compose -f docker-compose.prod.yml -f docker-compose.deploy.override.yml pull sub2api
            docker compose -f docker-compose.prod.yml -f docker-compose.deploy.override.yml up -d --no-deps --force-recreate sub2api

            container_id="$(docker compose -f docker-compose.prod.yml -f docker-compose.deploy.override.yml ps -q sub2api)"
            test -n "$container_id"

            expected_image="$image_ref"
            actual_image="$(docker inspect "$container_id" --format '{{.Config.Image}}')"
            if [ "$actual_image" != "$expected_image" ]; then
              echo "Unexpected sub2api image: expected=$expected_image actual=$actual_image" >&2
              docker compose -f docker-compose.prod.yml -f docker-compose.deploy.override.yml ps sub2api >&2 || true
              exit 1
            fi

            echo "Waiting for sub2api container health: $container_id ($expected_image)"
            ready="false"
            for attempt in $(seq 1 60); do
              status="$(docker inspect "$container_id" --format '{{.State.Status}}')"
              health="$(docker inspect "$container_id" --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}')"
              echo "sub2api status attempt=$attempt status=$status health=$health"

              if [ "$status" = "exited" ] || [ "$status" = "dead" ]; then
                docker logs --tail 200 "$container_id" >&2 || true
                exit 1
              fi

              if [ "$health" = "healthy" ]; then
                ready="true"
                break
              fi

              if curl --fail --silent --show-error --max-time 5 "http://127.0.0.1:${SERVER_PORT:-8080}/health" >/dev/null 2>&1 || \
                 curl --fail --silent --show-error --max-time 5 "http://127.0.0.1:8080/health" >/dev/null 2>&1; then
                ready="true"
                break
              fi

              sleep 5
            done

            if [ "$ready" != "true" ]; then
              echo "sub2api did not become healthy in time" >&2
              docker inspect "$container_id" --format '{{range .State.Health.Log}}{{.Start}} exit={{.ExitCode}} output={{.Output}}{{println}}{{end}}' >&2 || true
              docker logs --tail 200 "$container_id" >&2 || true
              exit 1
            fi

            curl --fail --retry 30 --retry-delay 2 --retry-all-errors --max-time 10 "http://127.0.0.1:${SERVER_PORT:-8080}/health" || \
              curl --fail --retry 30 --retry-delay 2 --retry-all-errors --max-time 10 "http://127.0.0.1:8080/health"
