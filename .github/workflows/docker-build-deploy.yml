name: Docker Build & Deploy via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/sub2api

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: sha-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.run_id }}

  deploy:
    name: Deploy on VM via SSH
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          IMAGE_TAG: sha-${{ github.sha }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          APP_DIR: ${{ secrets.SSH_APP_DIR }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_REPO,IMAGE_TAG,GHCR_USERNAME,GHCR_PAT,APP_DIR
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR_CLEAN="$(printf '%s' "$APP_DIR" | sed 's/[[:space:]]*$//')"
            DEPLOY_DIR="${APP_DIR_CLEAN:-/home/deploy/apps/sub2api}/deploy"
            cd "$DEPLOY_DIR"
            mkdir -p data postgres_data redis_data nginx/conf.d
            test -f .env
            test -f docker-compose.prod.yml
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            IMAGE_REPO="$IMAGE_REPO" IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.prod.yml pull
            IMAGE_REPO="$IMAGE_REPO" IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.prod.yml up -d
            curl --fail --retry 10 --retry-delay 5 http://127.0.0.1:${SERVER_PORT:-8080}/health || curl --fail --retry 10 --retry-delay 5 http://127.0.0.1:8080/health
            curl --fail --retry 10 --retry-delay 5 http://127.0.0.1/health
